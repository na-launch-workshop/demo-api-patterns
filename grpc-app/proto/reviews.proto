syntax = "proto3";

package reviews;

// Review service definition
service ReviewService {
  // Get all reviews
  rpc ListReviews(ListReviewsRequest) returns (ListReviewsResponse);

  // Get review by ID
  rpc GetReview(GetReviewRequest) returns (Review);

  // Create new review
  rpc CreateReview(CreateReviewRequest) returns (Review);

  // Delete review
  rpc DeleteReview(DeleteReviewRequest) returns (DeleteReviewResponse);

  // Get reviews for a book
  rpc GetReviewsByBook(GetReviewsByBookRequest) returns (ListReviewsResponse);

  // Add multiple reviews (client streaming)
  rpc AddReviews(stream CreateReviewRequest) returns (AddReviewsResponse);
}

// Messages
message Review {
  int32 id = 1;
  int32 book_id = 2;
  string reviewer_name = 3;
  int32 rating = 4;
  string comment = 5;
}

message ListReviewsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListReviewsResponse {
  repeated Review reviews = 1;
  int32 total = 2;
}

message GetReviewRequest {
  int32 id = 1;
}

message CreateReviewRequest {
  int32 book_id = 1;
  string reviewer_name = 2;
  int32 rating = 3;
  string comment = 4;
}

message DeleteReviewRequest {
  int32 id = 1;
}

message DeleteReviewResponse {
  bool success = 1;
  string message = 2;
}

message GetReviewsByBookRequest {
  int32 book_id = 1;
}

message AddReviewsResponse {
  int32 count = 1;
  string message = 2;
}
