{{- if (index .Values "gql-app-books" "enabled") }}
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: {{ index .Values "gql-app-books" "imageStream" "name" }}
  labels:
    {{- include "demo-apipatterns-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: gql-books
spec:
  lookupPolicy:
    local: true
{{- end }}
