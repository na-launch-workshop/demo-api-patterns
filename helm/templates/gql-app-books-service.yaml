{{- if (index .Values "gql-app-books" "enabled") }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "demo-apipatterns-chart.fullname" . }}-gql-books
  labels:
    {{- include "demo-apipatterns-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: gql-books
spec:
  type: {{ index .Values "gql-app-books" "service" "type" | default "ClusterIP" }}
  ports:
    - name: http
      port: {{ index .Values "gql-app-books" "service" "port" }}
      targetPort: http
      protocol: TCP
  selector:
    app: {{ include "demo-apipatterns-chart.fullname" . }}-gql-books
{{- end }}
