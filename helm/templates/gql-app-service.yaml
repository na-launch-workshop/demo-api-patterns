{{- if (index .Values "gql-app" "enabled") }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "demo-apipatterns-chart.appFullname" . }}
  labels:
    {{- include "demo-apipatterns-chart.labels" . | nindent 4 }}
spec:
  type: {{ index .Values "gql-app" "service" "type" | default "ClusterIP" }}
  ports:
    - name: http
      port: {{ index .Values "gql-app" "service" "port" }}
      targetPort: http
      protocol: TCP
  selector:
    app: {{ include "demo-apipatterns-chart.appFullname" . | quote }}
{{- end }}
